name: Deploy Frontend to DigitalOcean

on:
  push:
    branches: [main]

jobs:
  # ── Lint & build check ────────────────────────────────────────────────────
  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        env:
          # Use a placeholder at test time — the real URL is baked in on the server
          NEXT_PUBLIC_API_BASE_URL: http://localhost
        run: npm run build

  # ── Deploy frontend container ─────────────────────────────────────────────
  deploy:
    needs: [test-frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Pull latest frontend code
            cd /opt/solar/solar_ecommerce_frontend
            git pull origin main

            # Rebuild only the frontend container (nginx stays up, zero backend downtime)
            cd /opt/solar
            docker compose up -d --build frontend
            docker compose ps
            echo "✅ Frontend deployment complete"
